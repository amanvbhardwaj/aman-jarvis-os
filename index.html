<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aman OS – Jarvis</title>
  <style>
    /* Full-screen futuristic background */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f172a 0, #020617 60%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5f6ff;
    }

    /* Main Jarvis panel */
    .jarvis-panel {
      width: 90%;
      max-width: 900px;
      height: 80vh;
      padding: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.75); /* glassy */
      border: 1px solid rgba(56, 189, 248, 0.7); /* cyan border */
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Jarvis header */
    .jarvis-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .jarvis-title {
      font-size: 20px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7dd3fc;
    }

    .jarvis-status {
      font-size: 12px;
      text-transform: uppercase;
      color: #38bdf8;
    }

    .jarvis-status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
      margin-right: 6px;
    }

    /* Chat area */
    .jarvis-chat {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 64, 175, 0.45));
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap; /* keep line breaks */
    }

    .jarvis-user {
      color: #e5f6ff;
      margin-bottom: 8px;
    }

    .jarvis-assistant-label {
      color: #7dd3fc;
      margin-top: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .jarvis-assistant-text {
      color: #c4e1ff;
    }

    /* Input area */
    .jarvis-input-area {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .jarvis-input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.9);
      color: #e5f6ff;
      outline: none;
    }

    .jarvis-input::placeholder {
      color: #64748b;
    }

    .jarvis-send-btn {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0b1120;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.8);
    }

    .jarvis-send-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 6px rgba(56, 189, 248, 0.5);
    }

    /* Small animated scan line */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      top: -40%;
      height: 40%;
      background: linear-gradient(to bottom, rgba(56, 189, 248, 0.12), transparent);
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(120%); }
    }
  </style>
</head>
<body>
  <div class="jarvis-panel">
    <div class="scan-line"></div>

    <div class="jarvis-header">
      <div class="jarvis-title">AMAN OS – JARVIS</div>
      <div class="jarvis-status">
        <span class="jarvis-status-dot"></span>
        Online
      </div>
    </div>

    <div id="jarvis-chat" class="jarvis-chat">
      <div class="jarvis-user">You: hey jarvis</div>
      <div class="jarvis-assistant-label">Jarvis:</div>
      <div id="jarvis-reply" class="jarvis-assistant-text">
        Yes. How can I help you today?
      </div>
    </div>

    <div class="jarvis-input-area">
      <input
        id="jarvis-input"
        class="jarvis-input"
        type="text"
        placeholder="Speak to Jarvis..."
      />
      <button id="jarvis-send" class="jarvis-send-btn">Send</button>
    </div>
  </div>

  <script>
    const inputEl = document.getElementById('jarvis-input');
    const sendBtn = document.getElementById('jarvis-send');
    const chatEl = document.getElementById('jarvis-chat');
    const replyEl = document.getElementById('jarvis-reply');

    // Show text with a simple typing effect
    function showReplySlowly(text) {
      replyEl.textContent = '';
      let i = 0;

      const interval = setInterval(() => {
        replyEl.textContent += text[i];
        i += 1;
        if (i >= text.length) {
          clearInterval(interval);
        }
      }, 20); // adjust speed if you like
    }

    async function sendToJarvis() {
      const userMessage = inputEl.value.trim();
      if (!userMessage) return;

      // Show user message in the chat area
      const userLine = document.createElement('div');
      userLine.className = 'jarvis-user';
      userLine.textContent = `You: ${userMessage}`;
      chatEl.appendChild(userLine);

      // Label for Jarvis reply
      const label = document.createElement('div');
      label.className = 'jarvis-assistant-label';
      label.textContent = 'Jarvis:';
      chatEl.appendChild(label);

      // Clear current reply element for new text
      replyEl.textContent = '';
      chatEl.appendChild(replyEl);

      // Scroll to bottom
      chatEl.scrollTop = chatEl.scrollHeight;

      // Call your backend
      try {
        const response = await fetch('https://aman-jarvis-backend.onrender.com/api/jarvis', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userMessage }),
        });

        const data = await response.json();
        const text = data.reply || 'No reply from Jarvis.';

        showReplySlowly(text);
        chatEl.scrollTop = chatEl.scrollHeight;
      } catch (err) {
        showReplySlowly('Error talking to Jarvis.');
      }

      inputEl.value = '';
    }

    sendBtn.addEventListener('click', sendToJarvis);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendToJarvis();
      }
    });
  </script>
</body>
</html>
